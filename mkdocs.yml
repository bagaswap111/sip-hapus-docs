site_name: Hapus Regident Ditlantas Jateng
site_url: https://sip-hapus-docs.readthedocs.io/
site_description: Dokumentasi Sistem Informasi Penghapusan Registrasi dan Identifikasi Kendaraan Bermotor (Hapus Regident) Ditlantas Jawa Tengah

extra_css:
  - css/custom.css

theme:
  name: material
  language: id
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - toc:
      toc_depth: 2
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Beranda: index.md
  - Arsitektur & Teknologi: arsitektur.md
  - Panduan Instalasi: instalasi.md
  - Hak Akses (RBAC): rbac.md
  - Tutorial:
      - Autentikasi: tutorial/autentikasi.md
      - Dashboard: tutorial/dashboard.md
      - Kendaraan: tutorial/kendaraan.md
      - Manajemen Cabang: tutorial/manajemenCabang.md
      - Manajemen Pengguna: tutorial/manajemenPengguna.md
      - Manajemen Permission: tutorial/manajemenPermission.md
      - Manajemen Role: tutorial/manajemenRole.md
      - Notifikasi: tutorial/notifikasi.md
      - Pengajuan: tutorial/pengajuan.md
      - Profil: tutorial/profil.md
      - Surat Keputusan: tutorial/suratKeputusan.md
      - Surat Pengajuan: tutorial/suratPengajuan.md
      - Update Status: tutorial/updateStatus.md
  - Panduan Penggunaan:
      - Wajib Pajak (Warga/Dealer): manual/wajib_pajak.md
      - Petugas Instansi: manual/petugas.md
  - Troubleshooting: troubleshooting.md
