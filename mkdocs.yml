site_name: Hapus Regident Ditlantas Jateng
site_url: https://bagaswap111.github.io/sip-hapus-docs/
site_description: Dokumentasi Sistem Informasi Penghapusan Registrasi dan Identifikasi Kendaraan Bermotor (Hapus Regident) Ditlantas Jawa Tengah

extra_css:
  - css/custom.css

theme:
  name: material
  language: id
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - toc:
      toc_depth: 2
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Beranda: index.md
  - Arsitektur & Teknologi: arsitektur.md
  - Panduan Instalasi: instalasi.md
  - Hak Akses (RBAC): rbac.md
  - Tutorial:
      - 1. Autentikasi: tutorial/autentikasi.md
      - 2. Dashboard: tutorial/dashboard.md
      - 3. Pengajuan: tutorial/pengajuan.md
      - 4. Kendaraan: tutorial/kendaraan.md
      - 5. Update Status: tutorial/updateStatus.md
      - 6. Surat Pengajuan: tutorial/suratPengajuan.md
      - 7. Surat Keputusan: tutorial/suratKeputusan.md
      - 8. Profil: tutorial/profil.md
      - 9. Notifikasi: tutorial/notifikasi.md
      - 10. Manajemen Cabang: tutorial/manajemenCabang.md
      - 11. Manajemen Pengguna: tutorial/manajemenPengguna.md
      - 12. Manajemen Permission: tutorial/manajemenPermission.md
      - 13. Manajemen Role: tutorial/manajemenRole.md
  - Panduan Penggunaan:
      - Wajib Pajak (Warga/Dealer): manual/wajib_pajak.md
      - Petugas Instansi: manual/petugas.md
  - Troubleshooting: troubleshooting.md
