<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 210mm;
  height: 297mm;
  background: linear-gradient(180deg, #0D47A1 0%, #1565C0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.footer-area {
  padding-bottom: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bg-circle {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: rgba(255,255,255,0.02); top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.top-line {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, #FFD54F, transparent);
}
.bottom-line {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, #FFD54F, transparent);
}

.logo-small {
  width: 60px; height: 60px;
  border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20pt; font-weight: bold; color: #FFD54F;
  margin-bottom: 25px;
}
.divider {
  width: 60px; height: 2px; background: rgba(255,255,255,0.3);
  margin: 15px auto; border-radius: 1px;
}
.motto {
  font-size: 11pt; font-weight: 300; color: rgba(255,255,255,0.7);
  line-height: 1.6; font-style: italic;
}
.info {
  font-size: 10pt; color: rgba(255,255,255,0.5);
  line-height: 1.8; margin-top: 30px;
}
.dev {
  font-size: 10pt; color: rgba(255,255,255,0.4);
  margin-top: 4px;
}
.year {
  font-size: 11pt; color: #FFD54F; letter-spacing: 8px;
  margin-top: 10px;
}
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="bg-circle"></div>

  <div class="main-content">
    <div class="logo-small">HR</div>
    <div class="divider"></div>
    <p class="motto">
      "Mewujudkan pelayanan publik yang transparan,<br>
      akuntabel, dan terintegrasi dalam<br>
      penghapusan registrasi kendaraan bermotor<br>
      di Provinsi Jawa Tengah"
    </p>
  </div>

  <div class="footer-area">
    <p class="info">
      Dokumentasi Teknis — Sistem Informasi Pemerintahan Daerah<br>
      Direktorat Lalu Lintas Provinsi Jawa Tengah
    </p>
    <p class="dev">Dikembangkan oleh BINUS University</p>
    <p class="year">2 0 2 6</p>
  </div>
</body>
</html>
