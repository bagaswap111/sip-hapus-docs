<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 210mm;
  height: 297mm;
  background: linear-gradient(145deg, #0D47A1 0%, #1565C0 40%, #1976D2 70%, #1E88E5 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.footer-area {
  padding-bottom: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.circle-1 {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: rgba(255,255,255,0.03); top: -150px; right: -100px;
}
.circle-2 {
  position: absolute; width: 350px; height: 350px; border-radius: 50%;
  background: rgba(255,255,255,0.03); bottom: -80px; left: -80px;
}
.circle-3 {
  position: absolute; width: 200px; height: 200px; border-radius: 50%;
  border: 1px solid rgba(100,181,246,0.15); top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.top-line {
  position: absolute; top: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, #FFD54F, #FFB300, #FFD54F);
}
.bottom-line {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #FFD54F, #FFB300, #FFD54F);
}
.side-ornament {
  position: absolute; left: 30px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, transparent 5%, rgba(100,181,246,0.2) 20%, rgba(100,181,246,0.2) 80%, transparent 95%);
}

.logo {
  width: 90px; height: 90px;
  border: 3px solid rgba(255,255,255,0.9); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32pt; font-weight: bold; color: #FFD54F;
  margin-bottom: 30px;
}


h1 {
  font-size: 28pt; font-weight: 700; letter-spacing: 1px;
  line-height: 1.3; text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.divider {
  width: 80px; height: 3px; background: #FFD54F; margin: 20px auto;
  border-radius: 2px;
}
.subtitle {
  font-size: 12pt; font-weight: 400; color: rgba(255,255,255,0.9);
  line-height: 1.5; margin-top: 5px;
}
.creator {
  font-size: 11pt; font-weight: 300; color: rgba(255,255,255,0.7);
  margin-top: 10px; letter-spacing: 1px;
}
.creator strong { color: #FFD54F; font-weight: 600; }

.institution {
  font-size: 13pt; font-weight: 600; letter-spacing: 1px;
  color: rgba(255,255,255,0.95); margin-top: 25px;
}
.institution-divider {
  width: 150px; height: 1px; background: rgba(255,255,255,0.2);
  margin: 12px auto;
}
.year {
  font-size: 14pt; font-weight: 300; color: #FFD54F;
  letter-spacing: 8px;
}
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="side-ornament"></div>
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  <div class="circle-3"></div>

  <div class="main-content">
    <div class="logo">HR</div>
    <h1>Dokumentasi Aplikasi<br>Hapus Regident</h1>
    <div class="divider"></div>
    <p class="subtitle">
      Sistem Informasi Pemerintahan Daerah (SIPD)<br>
      Penghapusan Registrasi &amp; Identifikasi Kendaraan Bermotor
    </p>
    <p class="creator">Dikembangkan oleh <strong>BINUS University</strong></p>
  </div>

  <div class="footer-area">
    <p class="institution">DIREKTORAT LALU LINTAS<br>PROVINSI JAWA TENGAH</p>
    <div class="institution-divider"></div>
    <p class="year">2 0 2 6</p>
  </div>
</body>
</html>
